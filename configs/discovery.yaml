# Discovery / Dartmouth RC configuration.
# Resolves $HOME on the cluster login or compute node.

# Path to the sibling sparse-dictionary-learning clone on Discovery.
# Override via env: SCF_SDL_REPO=...
sdl_repo: ${HOME}/sparse-dictionary-learning

gpt_ckpt_dir: out
# Fill this in after the SAE training job finishes (e.g. "1731972401-autoencoder-openwebtext").
sae_ckpt_subdir: "1779647463.44"   # SAE job 8683697, 24413 steps, saved 2026-05-24

dataset: openwebtext
activation_threshold: 0.0
turn_pooling: max

coarsen:
  method: topk
  k: 5
  n_clusters: 50

device: cuda
batch_size: 32
max_tokens_per_turn: 512

corpus:
  name: sharegpt             # 2026-05-25: real corpus RyokoAI/ShareGPT52K sg_90k_part1.json (~45k real human/ChatGPT convs) downloaded to data/raw/. Was synthetic (2026-05-23) when no JSON was available.
  n_conversations: 10000
  max_turns: 12
  sharegpt_path: ${HOME}/SparseAutoEncoderInterp/data/raw/sharegpt.json
  strip_html: true           # 2026-05-25: gpt turns are HTML-wrapped, human turns plain -> raw extraction's 0.99 role-AUC was ~entirely a markup tell (scripts/evaluate_html_artifact.py). Strip to measure language, not HTML.
